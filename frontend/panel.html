<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>角色面板 - WuwaWebTool</title>
<link rel="icon" href="https://web-static.kurobbs.com/resource/prod/icon.ico">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
/* ===== Panel Page: 3-col layout ===== */
html, body { height: 100%; overflow: hidden; }

.panel-page {
  display: flex;
  height: calc(100vh - 48px);
  gap: 10px;
  padding: 4px 0;
}

/* ===== Left: Character List ===== */
.char-list-col {
  width: 250px;
  flex-shrink: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding-right: 4px;
}
.char-list-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.12s;
  background: var(--ink-1);
}
.char-list-item:hover { border-color: rgba(255,255,255,0.15); background: var(--bg-card-hover); }
.char-list-item.active { border-color: var(--accent); background: rgba(212,177,99,0.08); }
.char-list-item .cli-avatar {
  width: 42px; height: 42px;
  border-radius: 4px;
  background: rgba(0,0,0,0.3);
  flex-shrink: 0;
  object-fit: cover;
}
.char-list-item .cli-info { flex:1; min-width:0; }
.char-list-item .cli-name {
  font-size: 1.05rem; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.char-list-item .cli-meta {
  font-size: 0.85rem; color: var(--text-dim);
  display: flex; align-items: center; gap: 4px;
}
.char-list-item .cli-meta img { width: 16px; height: 16px; }
.char-list-item .cli-score {
  font-family: 'Oswald', sans-serif;
  font-size: 1.1rem; font-weight: 700;
  flex-shrink: 0;
  text-align: right;
  line-height: 1.1;
}
.char-list-item .cli-score small {
  font-size: 0.72rem; font-weight: 400; display: block;
  color: var(--text-dim);
}

/* ===== Right: Main Area ===== */
.panel-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ===== Top Row: Identity + Echoes ===== */
.panel-top-row {
  display: flex;
  gap: 8px;
  flex: 0 0 auto;
}

/* Identity Card — compact, don't stretch */
.identity-card {
  width: 280px;
  flex-shrink: 0;
  align-self: flex-start;
  background: var(--ink-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.identity-card .id-art {
  max-width: 100%;
  max-height: 200px;
  object-fit: contain;
  object-position: center 25%;
  border-radius: 8px;
  background: rgba(0,0,0,0.2);
  margin-bottom: 6px;
}
.identity-card .id-name-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.identity-card .id-name {
  font-size: 1.4rem; font-weight: 700; color: var(--text);
}
.identity-card .id-score-inline {
  font-family: 'Oswald', sans-serif;
  font-size: 1.15rem; font-weight: 700;
}
.identity-card .id-sub {
  font-size: 0.9rem; color: var(--text-dim);
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.identity-card .id-sub img {
  width: 18px; height: 18px;
  vertical-align: middle;
  object-fit: contain;
  flex-shrink: 0;
}
.identity-card .id-level {
  font-size: 0.9rem; color: var(--text-dim); margin-top: 2px;
}
.identity-card .id-chain {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin-top: 3px;
}
.identity-card .id-chain .chain-label {
  font-size: 0.8rem; color: var(--text-dim); margin-left: 4px;
}

/* Skin badge */
.skin-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.78rem;
  color: var(--text-dim);
  margin-top: 3px;
}
.skin-badge img { width: 18px; height: 18px; border-radius: 2px; }

/* ===== Echoes Panel ===== */
.echoes-card {
  flex: 1;
  min-width: 0;
  background: var(--ink-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.echoes-card .ec-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.echoes-card .ec-title {
  font-size: 0.95rem; font-weight: 700;
  color: var(--accent); text-transform: uppercase;
  letter-spacing: 0.5px; white-space: nowrap;
}
.echoes-card .ec-deco {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(212,177,99,0.35), transparent);
}

/* Sonata effect in echoes header */
.sonata-tag {
  position: relative;
  font-size: 0.78rem;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(212,177,99,0.1);
  border: 1px solid rgba(212,177,99,0.25);
  color: var(--accent);
  white-space: nowrap;
  cursor: help;
  flex-shrink: 0;
}
.sonata-tooltip {
  display: none;
  position: absolute;
  top: 100%; left: 0;
  margin-top: 4px;
  background: #1a2433;
  border: 1px solid var(--accent);
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 0.8rem;
  max-width: 380px;
  min-width: 300px;
  z-index: 50;
  line-height: 1.5;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  pointer-events: none;
  white-space: normal;
  word-wrap: break-word;
}
.sonata-tag:hover .sonata-tooltip { display: block; }

/* Echo Grid — responsive columns set via media queries */
.echo-grid {
  display: grid;
  gap: 8px;
  flex: 1;
  align-content: start;
  overflow-y: auto;
  padding: 2px 0;
}

/* ── Echo Card — pure HTML/CSS, no background image ── */
.echo-card {
  background: linear-gradient(180deg, rgba(20,28,40,0.95) 0%, rgba(15,22,32,0.98) 100%);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  container-type: inline-size;
  position: relative;
}
/* Grade-colored top accent bar */
.echo-card .ech-bar {
  height: clamp(4px, 2.2cqh, 8px);
  flex-shrink: 0;
}
.echo-card .ech-bar.grade-s   { background: #e9c46a; }
.echo-card .ech-bar.grade-a   { background: #b96ad9; }
.echo-card .ech-bar.grade-b   { background: #457b9d; }
.echo-card .ech-bar.grade-c   { background: #6b8e6e; }
.echo-card .ech-bar.grade-ss  { background: #f4a261; }
.echo-card .ech-bar.grade-sss { background: #e63946; }

/* Grade tag — top-right corner */
.echo-card .ech-grade-tag {
  position: absolute;
  top: 4px; right: 4px;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: clamp(9px, 4.5cqw, 14px);
  font-weight: 800;
  letter-spacing: 0.5px;
  z-index: 2;
  line-height: 1.5;
}

/* Inner content */
.echo-card .ech-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 3% 4% 4% 4%;
  min-height: 0;
}

/* ── Top row: icon + name ── */
.echo-card .ech-top {
  display: flex;
  align-items: flex-start;
  gap: 3%;
  margin-bottom: 2%;
}
.echo-card .ech-icon-wrap {
  position: relative;
  width: 26%;
  flex-shrink: 0;
  aspect-ratio: 1;
  border-radius: 3px;
  overflow: hidden;
  background: rgba(0,0,0,0.4);
}
.echo-card .ech-icon-img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.echo-card .ech-fetter-img {
  position: absolute;
  right: 0; bottom: 0;
  width: 42%; height: 42%;
  object-fit: contain;
  background: rgba(0,0,0,0.5);
  border-radius: 2px 0 0 0;
}

/* Name + badges */
.echo-card .ech-meta {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.echo-card .ech-name {
  color: #eab704;
  font-weight: 700;
  font-size: clamp(10px, 5.4cqw, 18px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}
.echo-card .ech-badges {
  display: flex;
  align-items: center;
  gap: 3%;
  flex-wrap: wrap;
}
.echo-card .ech-badge {
  display: inline-flex;
  align-items: center;
  padding: 1px 6px;
  border-radius: 100px;
  font-size: clamp(8px, 4.2cqw, 14px);
  font-weight: 600;
  white-space: nowrap;
  line-height: 1.6;
}
.echo-card .ech-badge.lv {
  background: rgba(255,255,255,0.1);
  color: #ccc;
}
.echo-card .ech-badge.score {
  background: rgba(186,55,42,0.7);
  color: #fff;
  font-weight: 700;
}

/* ── COST stars ── */
.echo-card .ech-cost-row {
  display: flex;
  gap: 1px;
  margin-bottom: 1.5%;
}
.echo-card .ech-star {
  width: clamp(12px, 7cqw, 24px);
  opacity: 0.75;
}

/* ── Substat divider ── */
.echo-card .ech-div {
  height: 1px;
  background: rgba(255,255,255,0.06);
  margin-bottom: 2%;
  flex-shrink: 0;
}

/* ── Substat list ── */
.echo-card .ech-stats {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-height: 0;
}
.echo-card .ech-stat {
  display: flex;
  align-items: center;
  gap: 2%;
  flex: 1;
  min-height: 0;
}
.echo-card .ech-stat-div {
  height: 1px;
  background: rgba(255,255,255,0.08);
  margin: 1px 0;
  flex-shrink: 0;
}
.echo-card .ech-stat-icon {
  width: clamp(16px, 10cqw, 32px);
  flex-shrink: 0;
  opacity: 0.85;
}
.echo-card .ech-stat-name {
  flex: 1;
  font-size: clamp(8px, 4.2cqw, 15px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.echo-card .ech-stat-val {
  font-size: clamp(8px, 4.2cqw, 15px);
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}
.echo-card .ech-stat-subscore {
  font-size: clamp(6px, 2.8cqw, 11px);
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
  margin-left: auto;
  opacity: 0.82;
  min-width: 1.2em;
  text-align: right;
}

/* ===== Bottom Row: Weapon | Skills | Stats ===== */
.panel-bottom-row {
  display: flex;
  gap: 8px;
  flex: 1 1 auto;
  min-height: 0;
}

.info-card {
  flex: 1;
  min-width: 0;
  background: var(--ink-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px 14px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.info-card .ic-title {
  font-size: 0.9rem; font-weight: 700;
  color: var(--accent); text-transform: uppercase;
  letter-spacing: 0.5px;
  padding-bottom: 5px; margin-bottom: 6px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0;
}
.info-card .ic-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--line), transparent);
}

/* Weapon */
.weapon-row {
  display: flex; align-items: flex-start; gap: 10px;
}
.weapon-row img {
  width: 48px; height: 48px;
  border-radius: 6px; background: rgba(0,0,0,0.35); flex-shrink: 0;
}
.weapon-row .wr-info { flex: 1; min-width: 0; }
.weapon-row .wr-name { font-weight: 600; font-size: 1rem; }
.weapon-row .wr-detail { color: var(--text-dim); font-size: 0.85rem; }
.weapon-row .wr-passive {
  font-size: 0.8rem; color: var(--text-dim);
  margin-top: 4px; line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
  cursor: pointer;
}
.weapon-row .wr-passive.expanded { -webkit-line-clamp: unset; }

/* Weapon stats (main props) */
.weapon-stats {
  margin-top: 5px;
  display: flex;
  gap: 12px;
  font-size: 0.84rem;
}
.weapon-stats .ws-item { color: var(--text-dim); }
.weapon-stats .ws-item span { color: var(--text); font-weight: 600; }

/* Skills */
.skills-list { display: flex; flex-direction: column; gap: 1px; }
.skills-list .sk-item {
  display: flex; align-items: center; gap: 6px;
  padding: 1.5px 0; font-size: 0.88rem;
  cursor: pointer;
  flex-wrap: wrap;
}
.skills-list .sk-item:hover { color: #fff; }
.skills-list .sk-item img {
  width: 24px; height: 24px; border-radius: 4px;
  background: rgba(0,0,0,0.3); flex-shrink: 0;
}
.skills-list .sk-item .sk-name {
  flex: 1; color: var(--text-dim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.skills-list .sk-item .sk-lv { font-weight: 700; flex-shrink: 0; }
.skills-list .sk-item .sk-arrow {
  font-size: 0.65rem; color: var(--text-dim);
  transition: transform 0.15s; flex-shrink: 0;
}
.skills-list .sk-item.expanded .sk-arrow { transform: rotate(180deg); }
.skills-list .sk-desc {
  display: none;
  width: 100%;
  font-size: 0.8rem;
  color: var(--text-dim);
  padding: 4px 0 6px 30px;
  line-height: 1.5;
}
.skills-list .sk-item.expanded .sk-desc { display: block; }

/* Branch indicator */
.branch-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.82rem;
  padding: 2px 7px;
  border-radius: 4px;
  background: rgba(212,177,99,0.08);
  border: 1px solid rgba(212,177,99,0.2);
  color: var(--accent);
  margin-top: 5px;
}
.branch-badge img { width: 18px; height: 18px; border-radius: 2px; }

/* Stats */
.stats-list { display: flex; flex-direction: column; gap: 1px; }
.stats-list .st-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.5px 0; font-size: 0.88rem;
}
.stats-list .st-item .st-label {
  color: var(--text-dim); display: flex; align-items: center; gap: 5px;
}
.stats-list .st-item .st-label img { width: 18px; height: 18px; flex-shrink: 0; }
.stats-list .st-item .st-val { font-weight: 600; }

/* Stats sub-section: phantom bonus */
.stats-sub-title {
  font-size: 0.8rem; font-weight: 700;
  color: rgba(212,177,99,0.6);
  text-transform: uppercase; letter-spacing: 0.3px;
  padding-top: 6px; margin-top: 4px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

/* Empty */
.empty-hint { color: var(--text-dim); text-align: center; padding: 20px 10px; font-size: 0.95rem; }

/* Refresh button in identity card */
.btn-refresh-char {
  margin-top: 10px;
  padding: 5px 14px;
  border-radius: 6px;
  border: 1px solid var(--accent);
  background: rgba(212,177,99,0.08);
  color: var(--accent);
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 600;
}
.btn-refresh-char:hover {
  background: rgba(212,177,99,0.18);
  border-color: #fff;
  color: #fff;
}
.btn-refresh-char:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Toast */
#toast {
  position: fixed; top: 20px; right: 20px;
  padding: 10px 18px; border-radius: 8px; color: #fff;
  font-size: 0.95rem; z-index: 9999;
  pointer-events: none; opacity: 0;
  transition: opacity 0.25s;
}
#toast.toast-success { background: #2d6a4f; opacity: 1; }
#toast.toast-error   { background: #c1121f; opacity: 1; }

/* ===== Responsive — column count adapts to viewport ===== */
.echo-grid { grid-template-columns: repeat(2, 1fr); }
.echo-card { min-width: 200px; }

@media (min-width: 800px) {
  .echo-grid { grid-template-columns: repeat(3, 1fr); }
  .echo-card { min-width: 190px; }
}
@media (min-width: 1100px) {
  .echo-grid { grid-template-columns: repeat(4, 1fr); }
  .echo-card { min-width: 185px; }
  .char-list-col { width: 220px; }
  .identity-card { width: 260px; padding: 12px 15px; }
  .identity-card .id-art { max-height: 160px; }
}
@media (min-width: 1450px) {
  .echo-grid { grid-template-columns: repeat(5, 1fr); }
  .echo-card { min-width: 175px; }
  .char-list-col { width: 250px; }
  .identity-card { width: 280px; }
  .identity-card .id-art { max-height: 200px; }
}

/* Mobile: collapse panel layout */
@media (max-width: 799px) {
  .panel-page { flex-direction: column; height: auto; overflow-y: auto; }
  .char-list-col { width: 100%; max-height: 130px; flex-direction: row; flex-wrap: wrap; overflow-y: auto; gap: 5px; }
  .char-list-item { flex: 0 0 auto; min-width: 140px; padding: 6px 8px; }
  .char-list-item .cli-avatar { width: 34px; height: 34px; }
  .char-list-item .cli-name { font-size: 0.92rem; }
  .char-list-item .cli-meta { font-size: 0.76rem; }
  .panel-top-row { flex-direction: column; }
  .identity-card { width: 100%; align-self: auto; padding: 10px 14px; }
  .identity-card .id-art { max-height: 100px; max-width: 180px; }
  .panel-bottom-row { flex-direction: column; }
  .info-card { flex: 1 1 auto; }
}

/* Single column */
@media (max-width: 520px) {
  .echo-grid { grid-template-columns: 1fr; }
  .echo-card { min-width: 240px; }
  .char-list-item { min-width: 100px; }
  .char-list-item .cli-meta { font-size: 0.72rem; }
  .char-list-item .cli-name { font-size: 0.88rem; }
  .identity-card .id-art { max-height: 70px; max-width: 120px; }
}
</style>
</head>
<body>

<header class="header">
  <a href="index.html" class="back-link">← 返回列表</a>
  <h1 id="pageTitle">角色面板</h1>
  <a href="https://github.com/eventhorizonsky/WuwaWebTool" style="color:var(--text-dim);text-decoration:none" target="_blank" title="WuwaWebTool on GitHub">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-2px"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
  </a>
  <span style="font-size:0.65rem;color:var(--text-dim);flex-shrink:0">改自 <a href="https://github.com/Loping151/XutheringWavesUID" style="color:var(--text-dim)" target="_blank" title="XutheringWavesUID">XutheringWavesUID</a></span>
  <button class="btn btn-accent" onclick="exportImage()">导出图片</button>
</header>

<main class="container">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>加载中...</p>
  </div>
  <div class="error" id="errorBox" style="display:none"></div>

  <div id="exportArea">
    <div class="panel-page" id="panelPage">
      <div class="char-list-col" id="charList"></div>
      <div class="panel-main" id="panelMain"></div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script src="js/api.js"></script>
<script>
let currentCharId = new URLSearchParams(location.search).get('charId');
let allRoles = [];
let currentRole = null;

// ===== Init =====
(function init() {
  if (!currentCharId) { showError('未指定角色ID'); return; }
  if (!isLoggedIn()) { showError('请先<a href="/login" style="color:var(--accent)">登录</a>'); return; }
  initPanel();
})();

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  const err = document.getElementById('errorBox');
  err.style.display = 'block';
  err.innerHTML = msg;
}

async function initPanel() {
  const loading = document.getElementById('loading');
  try {
    // Load basic role list from cache (no scores/details needed — those are per-character)
    allRoles = cacheGet('roleList') || [];
    if (!allRoles.length) {
      const rd = await apiGetRoleData();
      if (rd.success && rd.data) {
        const rl = (rd.data && rd.data.roleList) ? rd.data.roleList : (Array.isArray(rd.data) ? rd.data : []);
        allRoles = rl;
        // Initialize without scores/details
        for (const r of allRoles) { r._score = null; r._grade = null; r._detail = null; }
        cacheSet('roleList', allRoles);
      }
    }
    if (!allRoles.length) {
      allRoles = [{ roleId: parseInt(currentCharId) || 0 }];
    }
    renderCharList();
    await loadCharacter(currentCharId);
    renderCharList(); // Update sidebar with cached score
  } catch (e) {
    showError('初始化失败: ' + e.message);
  }
  loading.style.display = 'none';
}

// ===== Character List =====
function renderCharList() {
  const container = document.getElementById('charList');
  if (!allRoles.length) {
    container.innerHTML = '<div class="empty-hint">暂无角色</div>';
    return;
  }
  container.innerHTML = allRoles.map(r => {
    const ri    = r.role || r;
    const cid   = String(ri.roleId || r.roleId || '');
    const name  = ri.roleName || '?';
    const attr  = ATTRIBUTES[ri.attributeId] || null;
    const wt    = WEAPON_TYPES[ri.weaponTypeId] || '';
    const lv    = r.level || ri.level || '?';
    const isActive = cid === currentCharId;
    const attrIcon = attr ? getAttrIcon(attr.name) : '';
    const attrColor = attr ? attr.color : '#666';

    // Check per-character score cache
    const cachedScore = cacheGetScore(cid);
    let scoreHTML = '';
    if (cachedScore && cachedScore.total_score != null) {
      const g = getCompositeGrade(cachedScore.total_score);
      scoreHTML = `<div class="cli-score" style="color:${g.color}">${g.label}<small>${cachedScore.total_score.toFixed(0)}</small></div>`;
    }

    return `
      <div class="char-list-item${isActive ? ' active' : ''}" data-cid="${cid}" onclick="switchCharacter('${cid}')">
        <img class="cli-avatar" src="${getResourceUrl('role_pile', 'role_pile_' + cid + '.png')}" alt="" onerror="this.style.display='none'">
        <div class="cli-info">
          <div class="cli-name">${name}</div>
          <div class="cli-meta">
            Lv.${lv} · ${wt}
            ${attrIcon ? `<img src="${attrIcon}" alt="" style="vertical-align:middle">` : ''}
            <span style="color:${attrColor}">${attr ? attr.name : ''}</span>
          </div>
        </div>
        ${scoreHTML}
      </div>`;
  }).join('');
}

// ===== Switch Character =====
async function switchCharacter(charId) {
  if (charId === currentCharId) return;
  currentCharId = charId;
  currentRole = null;
  window._subWeights = {};
  window._mainWeights = {};
  window._echoGrades = {};
  const url = new URL(location);
  url.searchParams.set('charId', charId);
  history.pushState({}, '', url);
  renderCharList();
  document.getElementById('panelMain').innerHTML =
    '<div style="text-align:center;padding:60px"><div class="spinner"></div></div>';
  await loadCharacter(charId, false);
  renderCharList(); // Update sidebar with cached score for this character
}

// ===== Load Character =====
async function loadCharacter(charId, forceRefresh) {
  try {
    // Use cache-first loading — only calls official API on first visit or explicit refresh
    const { detail, score } = await loadCharDetailAndScore(charId, forceRefresh);
    if (!detail) throw new Error('未找到角色数据');

    currentRole = detail;
    window._lastRole = detail;
    document.getElementById('pageTitle').textContent =
      (detail.role?.roleName || detail.roleName || '角色') + ' - 面板';
    renderAll(detail);

    if (score) {
      displayScore(score);
    }
  } catch (e) {
    document.getElementById('panelMain').innerHTML =
      '<div class="error" style="display:block;margin:12px">加载失败: ' + e.message + '</div>';
  }
}

// ===== Render All Panels =====
function renderAll(role) {
  const ri    = role.role || role;
  const attr  = ATTRIBUTES[ri.attributeId] || { name: '?', color: '#666' };
  const wt    = WEAPON_TYPES[ri.weaponTypeId] || '?';
  const cn    = ri.roleName || '?';
  const lv    = role.level || ri.level || '?';
  const sl    = ri.starLevel || 5;
  const chain = role.chainList ? role.chainList.filter(c => c.unlocked).length : (ri.chain || 0);

  // Chain dots
  let cd = '';
  for (let i = 1; i <= 6; i++) {
    cd += `<span class="chain-dot${i <= chain ? ' active' : ''}"></span>`;
  }

  // Skin
  const skin = role.roleSkin;
  const skinHTML = skin ? `
    <div class="skin-badge">
      <img src="${skin.skinIcon || ''}" alt="" onerror="this.style.display='none'">
      ${skin.skinName || skin.qualityName || ''}
    </div>` : '';

  // Weapon
  let weaponHTML = '<div class="empty-hint">暂无武器</div>';
  if (role.weaponData) {
    const wd = role.weaponData, w = wd.weapon;
    const mainStats = (wd.mainPropList || []).map(s =>
      `<span class="ws-item">${s.attributeName}: <span>${s.attributeValue}</span></span>`
    ).join('');
    weaponHTML = `
      <div class="weapon-row">
        <img src="${getResourceUrl('waves_weapon', 'weapon_' + (w.weaponId || '') + '.png')}" alt="" onerror="this.style.display='none'">
        <div class="wr-info">
          <div class="wr-name">${w.weaponName || '武器'} ⭐${w.weaponStarLevel || 1}</div>
          <div class="wr-detail">Lv.${wd.level || 1} / 精${wd.resonLevel || 1}</div>
          ${mainStats ? `<div class="weapon-stats">${mainStats}</div>` : ''}
          ${w.effectDescription ? `<div class="wr-passive" onclick="this.classList.toggle('expanded')" title="点击展开/收起">${w.weaponEffectName ? '【' + w.weaponEffectName + '】' : ''}${w.effectDescription}</div>` : ''}
        </div>
      </div>`;
  }

  // Skills + Branch
  let skillsHTML = '<div class="empty-hint">暂无技能</div>';
  if (role.skillList) {
    const sorted = [...role.skillList].sort(
      (a, b) => SKILL_ORDER.indexOf(a.skill?.type) - SKILL_ORDER.indexOf(b.skill?.type)
    );
    skillsHTML = `
      <div class="skills-list">
        ${sorted.map(s => `
          <div class="sk-item" onclick="this.classList.toggle('expanded')">
            <img src="${s.skill?.iconUrl || ''}" alt="" onerror="this.style.display='none'">
            <span class="sk-name">${s.skill?.type || '?'}${s.skill?.name ? ' - ' + s.skill.name : ''}</span>
            <span class="sk-lv">Lv.${s.level || 1}</span>
            <span class="sk-arrow">▼</span>
            ${s.skill?.description ? `<div class="sk-desc">${s.skill.description.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>')}</div>` : ''}
          </div>`).join('')}
      </div>`;
  }

  // Active branch
  let branchHTML = '';
  if (role.skillBranchList) {
    const activeBranchId = role.activeBranchId;
    const active = role.skillBranchList.find(b => b.branchId === activeBranchId) || role.skillBranchList[0];
    const inactive = role.skillBranchList.find(b => b.branchId !== activeBranchId);
    if (active) {
      branchHTML = `
        <div class="branch-badge" title="${active.desc ? active.desc.replace(/<[^>]*>/g, '') : ''}">
          <img src="${active.skillIcon || ''}" alt="" onerror="this.style.display='none'">
          ${active.branchName}
          ${inactive ? `<span style="color:var(--text-dim);margin-left:2px">(${inactive.branchName}未激活)</span>` : ''}
        </div>`;
    }
  }

  // Stats
  const al = role.roleAttributeList || ri.attributeList || [];
  const bonusProps = role.equipPhantomAddPropList || [];

  // Filter base stats (HP/ATK/DEF + core combat stats)
  const coreKeys = ['生命','攻击','防御','暴击','暴击伤害','共鸣效率'];
  const coreStats = al.filter(s => coreKeys.includes(s.attributeName));
  const otherStats = al.filter(s => !coreKeys.includes(s.attributeName));

  const renderStatRow = (s) => `
    <div class="st-item">
      <span class="st-label">
        <img src="${s.iconUrl || ''}" alt="" onerror="this.style.display='none'">
        ${s.attributeName}
      </span>
      <span class="st-val">${s.attributeValue}</span>
    </div>`;

  let statsHTML = '<div class="empty-hint">暂无属性</div>';
  if (al.length) {
    statsHTML = `
      <div class="stats-list">
        ${coreStats.map(renderStatRow).join('')}
        ${otherStats.length ? `<div class="stats-sub-title">其他加成</div>` : ''}
        ${otherStats.map(renderStatRow).join('')}
      </div>`;
  }

  // Sonata effect
  let sonataHTML = '';
  const firstEcho = role.phantomData?.equipPhantomList?.[0];
  if (firstEcho?.fetterDetail) {
    const fd = firstEcho.fetterDetail;
    sonataHTML = `
      <span class="sonata-tag">
        ${fd.name}
        <span class="sonata-tooltip">
          <b>2件套:</b> ${fd.firstDescription || '—'}<br>
          <b>5件套:</b> ${fd.secondDescription || '—'}
          ${fd.tripleDescription ? `<br><b>—:</b> ${fd.tripleDescription}` : ''}
        </span>
      </span>`;
  }

  // Echoes
  const echoesHTML = renderEchoGrid(role);

  // Total echo cost
  const totalCost = role.phantomData?.cost || 0;

  // Assemble
  document.getElementById('panelMain').innerHTML = `
    <div class="panel-top-row">
      <div class="identity-card">
        <img class="id-art" src="${getResourceUrl('role_pile', 'role_pile_' + currentCharId + '.png')}" alt="" onerror="this.style.display='none'">
        <div class="id-name-row">
          <span class="id-name">${cn}</span>
          <span class="id-score-inline" id="sbGradeInline" style="display:none"></span>
        </div>
        <div class="id-sub">
          <img src="${getWeaponTypeIcon(wt)}" alt="" onerror="this.style.display='none'">
          ${wt} · <span style="color:${attr.color}">
          <img src="${getAttrIcon(attr.name)}" alt="" onerror="this.style.display='none'">
          ${attr.name}</span>
        </div>
        <div class="id-level">Lv.${lv} ${'⭐'.repeat(Math.min(sl, 5))}</div>
        <div class="id-chain">
          ${cd}
          <span class="chain-label">共鸣链 ${chain}/6</span>
        </div>
        ${skinHTML}
        <button class="btn-refresh-char" onclick="event.stopPropagation();refreshCurrentCharacter()" title="重新获取角色数据并评分">
          🔄 刷新角色
        </button>
      </div>
      <div class="echoes-card">
        <div class="ec-header">
          <span class="ec-title">装备声骸</span>
          ${sonataHTML}
          <span style="font-size:0.78rem;color:var(--text-dim);margin-left:auto">COST ${totalCost}</span>
          <div class="ec-deco" style="flex:0 0 20px"></div>
        </div>
        <div class="echo-grid" id="echoGrid">${echoesHTML}</div>
      </div>
    </div>
    <div class="panel-bottom-row">
      <div class="info-card">
        <div class="ic-title">武器</div>
        ${weaponHTML}
      </div>
      <div class="info-card">
        <div class="ic-title">技能</div>
        ${skillsHTML}
        ${branchHTML}
      </div>
      <div class="info-card">
        <div class="ic-title">属性</div>
        ${statsHTML}
      </div>
    </div>`;
}

// ===== Echo stat colors — served from backend via get_valid_color() in compiled .pyd =====
// Colors come from substat_scores[phantomIdx][propIdx].{name_color, num_color}
// Fallback only if backend data is not available yet
function getEchoStatColorsFallback(isMain) {
  if (isMain) return { nameColor: '#ffffff', numColor: '#ffffff' };
  return { nameColor: '#95a5a6', numColor: '#95a5a6' }; // moonlit fallback
}

// ===== Render Echo Grid =====
function renderEchoGrid(role) {
  if (!role.phantomData || !role.phantomData.equipPhantomList) {
    return '<div class="empty-hint">暂无装备声骸</div>';
  }
  const echoGrades = window._echoGrades || {};

  return role.phantomData.equipPhantomList.map((p, i) => {
    if (!p || !p.phantomProp) return '';
    const pp   = p.phantomProp;
    const icon = getResourceUrl('phantom', 'phantom_' + pp.phantomId + '.png');
    const eg   = echoGrades[i] || {};
    const grade = eg.grade || 'c';
    const score = eg.score;
    const gradeInfo = score != null ? getEchoGrade(score) : { color: '#6b8e6e' };
    const gradeColor = gradeInfo.color;

    // Fetter/sonata icon overlay
    const fetterIcon = p.fetterDetail ? getAttrEffectIcon(p.fetterDetail.name) : '';

    // Combine main + sub props
    const mainProps = p.mainProps || [];
    const subProps = p.subProps || [];

    // Main stat rows — always white
    const mainHTML = mainProps.map((s) => {
      const statIcon = getTextureUrl('attribute_prop', 'attr_prop_' + s.attributeName + '.png');
      return `<div class="ech-stat">
        <img class="ech-stat-icon" src="${statIcon}" alt="" onerror="this.style.display='none'">
        <span class="ech-stat-name" style="color:#ffffff">${s.attributeName}</span>
        <span class="ech-stat-val" style="color:#ffffff">${s.attributeValue}</span>
      </div>`;
    }).join('');

    // Sub stat rows — colors from backend get_valid_color(), per-substat score from calc_phantom_entry()
    const subScores = eg.substat_scores || [];
    const subHTML = subProps.map((s, si) => {
      const statIcon = getTextureUrl('attribute_prop', 'attr_prop_' + s.attributeName + '.png');
      // Read real colors from .pyd (returned by backend in substat_scores)
      const sc = subScores[mainProps.length + si];
      const nameColor = (sc && sc.name_color) || '#ffffff';
      const numColor  = (sc && sc.num_color)  || '#ffffff';
      // Per-substat individual score
      const subScoreVal = (sc && sc.score != null) ? sc.score : 0;
      const subScoreColor = subScoreVal > 0 ? '#3598db' : '#95a5a6'; // WAVES_FREEZING : WAVES_MOONLIT
      return `<div class="ech-stat">
        <img class="ech-stat-icon" src="${statIcon}" alt="" onerror="this.style.display='none'">
        <span class="ech-stat-name" style="color:${nameColor}">${s.attributeName}</span>
        <span class="ech-stat-val" style="color:${numColor}">${s.attributeValue}</span>
        <span class="ech-stat-subscore" style="color:${subScoreColor}">${subScoreVal}</span>
      </div>`;
    }).join('');

    // Divider between main and sub
    const divider = mainProps.length && subProps.length
      ? '<div class="ech-stat-div"></div>' : '';

    const statsHTML = mainHTML + divider + subHTML;

    // COST stars
    const costStars = Array.from({length: p.cost || 0}, () =>
      `<img class="ech-star" src="assets/textures/texture2d/promote_icon.png" alt="">`
    ).join('');

    const scoreText = score != null ? score.toFixed(1) + '分' : '--';

    return `
      <div class="echo-card" id="echo-${i}">
        <div class="ech-bar grade-${grade}"></div>
        <div class="ech-grade-tag" style="background:${gradeColor};color:#fff">${grade.toUpperCase()}</div>
        <div class="ech-body">
          <div class="ech-top">
            <div class="ech-icon-wrap">
              <img class="ech-icon-img" src="${icon}" alt="" onerror="this.style.display='none'">
              ${fetterIcon ? `<img class="ech-fetter-img" src="${fetterIcon}" alt="">` : ''}
            </div>
            <div class="ech-meta">
              <span class="ech-name">${pp.name || '声骸'}</span>
              <div class="ech-badges">
                <span class="ech-badge lv">Lv.${p.level || '?'}</span>
                <span class="ech-badge score" id="echoScore-${i}">${scoreText}</span>
              </div>
            </div>
          </div>
          <div class="ech-cost-row">${costStars}</div>
          <div class="ech-div"></div>
          <div class="ech-stats">${statsHTML}</div>
        </div>
      </div>`;
  }).join('');
}

// ===== Display Score =====
function displayScore(data) {
  window._subWeights  = data.sub_weights || {};
  window._mainWeights = data.main_weights || {};

  // Store per-echo grades for title bar + score pill rendering, plus per-substat scores
  const echoGrades = {};
  if (data.phantoms) {
    data.phantoms.forEach((p, i) => {
      echoGrades[i] = {
        grade: p.grade || 'c',
        score: p.score,
        substat_scores: (data.substat_scores && data.substat_scores[i])
          ? data.substat_scores[i]
          : [],
      };
    });
  }
  window._echoGrades = echoGrades;

  // Re-render echo grid with scores
  const echoGrid = document.getElementById('echoGrid');
  if (echoGrid && currentRole) {
    echoGrid.innerHTML = renderEchoGrid(currentRole);
  }

  // Update inline score in identity card
  const g = getCompositeGrade(data.total_score || 0);
  const el = document.getElementById('sbGradeInline');
  if (el) {
    el.style.display = '';
    el.textContent = g.label + ' · ' + (data.total_score || 0).toFixed(2);
    el.style.color = g.color;
  }
}

// ===== Export =====
async function exportImage() {
  try {
    const c = await html2canvas(document.getElementById('exportArea'), {
      backgroundColor: '#0f1923', scale: 2, useCORS: true, allowTaint: true
    });
    const a = document.createElement('a');
    a.download = 'wuwa-panel-' + currentCharId + '.png';
    a.href = c.toDataURL();
    a.click();
    toast('已导出', 'success');
  } catch (e) {
    toast('导出失败', 'error');
  }
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast-' + type;
  setTimeout(() => { el.textContent = ''; el.className = ''; }, 3000);
}

// ===== Refresh Current Character =====
async function refreshCurrentCharacter() {
  if (!currentCharId) return;
  const btn = document.querySelector('.btn-refresh-char');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 刷新中...'; }
  try {
    // Clear per-character caches to force re-fetch from official API
    localStorage.removeItem('wuwa_roledetail_' + currentCharId);
    localStorage.removeItem('wuwa_score_' + currentCharId);
    // Re-fetch from official API and re-score
    await loadCharacter(currentCharId, true);
    // Update sidebar list to reflect new score
    renderCharList();
    toast('角色数据已刷新', 'success');
  } catch (e) {
    toast('刷新失败: ' + e.message, 'error');
  }
  if (btn) { btn.disabled = false; btn.textContent = '🔄 刷新角色'; }
}
