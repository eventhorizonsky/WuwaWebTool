<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WuwaWebTool — 角色面板</title>
    <link rel="icon" href="https://web-static.kurobbs.com/resource/prod/icon.ico">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .section-header-controls { display: flex; gap: 8px; align-items: center; margin-left: auto; flex-shrink: 0; }
        .section-header-controls input { padding: 5px 8px; border-radius: 6px; background: rgba(0,0,0,0.3); border: 1px solid var(--line); color: var(--text); font-size: 0.82rem; max-width: 140px; }
        .section-header-controls input:focus { outline: none; border-color: var(--accent); }
        .section-header-controls select { padding: 5px 8px; border-radius: 6px; background: rgba(0,0,0,0.3); border: 1px solid var(--line); color: var(--text); font-size: 0.82rem; }
        .section-header-controls select:focus { outline: none; border-color: var(--accent); }
        .no-results { text-align: center; color: var(--text-dim); padding: 60px 20px; font-size: 1.1rem; grid-column: 1 / -1; }
        .page-sidebar .user-card { margin-bottom: 0; }
    </style>
</head>
<body>

<header class="header">
    <h1>角色面板</h1>
    <a href="https://github.com/eventhorizonsky/WuwaWebTool" style="color:var(--text-dim);text-decoration:none" target="_blank" title="WuwaWebTool on GitHub">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-2px"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
    <span style="font-size:0.65rem;color:var(--text-dim);flex-shrink:0">改自 <a href="https://github.com/Loping151/XutheringWavesUID" style="color:var(--text-dim)" target="_blank" title="XutheringWavesUID">XutheringWavesUID</a></span>
    <div class="account-area" id="accountArea" style="display:none">
        <select class="account-select" id="accountSelect" onchange="onAccountChange()"></select>
        <button class="btn-sm accent" onclick="refreshAll()">刷新</button>
    </div>
    <div class="user-area">
        <span class="login-status" id="loginStatus">未登录</span>
        <button class="btn-sm accent" id="loginBtn" onclick="goLogin()">登录</button>
        <button class="btn-sm" id="logoutBtn" onclick="doLogout()" style="display:none">退出</button>
    </div>
</header>

<main class="container">

    <div class="page-layout" style="flex:1;min-height:0;">
        <!-- === LEFT SIDEBAR === -->
        <div class="page-sidebar" id="pageSidebar">

            <!-- User Card -->
            <div class="user-card" id="userCard" style="display:none">
                <div class="deco-text">ROVER CARD</div>
                <div class="avatar-container">
                    <div class="avatar-ring"></div>
                    <img class="avatar" id="userAvatar" src="" alt="Avatar">
                </div>
                <div class="user-info">
                    <div class="user-row-1">
                        <div class="user-name" id="userName">--</div>
                        <div class="user-uid" id="userUid">UID --</div>
                    </div>
                    <div class="user-stats" id="userStats"></div>
                </div>
            </div>

            <!-- Data Overview -->
            <div class="section-container" id="overviewSection" style="display:none">
                <div class="section-header">
                    <div class="section-title">数据概览</div>
                    <div class="section-deco-line"></div>
                </div>
                <div class="base-info-grid" id="overviewGrid"></div>
            </div>

        </div>

        <!-- === RIGHT MAIN === -->
        <div class="page-main">

            <!-- Character Grid -->
            <div class="section-container" style="flex:1;display:flex;flex-direction:column;min-height:0;">
                <div class="section-header">
                    <div class="section-title">共鸣者</div>
                    <div class="section-deco-line"></div>
                    <div class="section-header-controls">
                        <input type="text" id="searchInput" placeholder="搜索..." oninput="renderRoleGrid()">
                        <select id="sortSelect" onchange="renderRoleGrid()">
                            <option value="score">评分</option>
                            <option value="level">等级</option>
                            <option value="element">属性</option>
                        </select>
                    </div>
                </div>
                <div style="overflow-y:auto;flex:1;min-height:0;padding:4px 4px 0 4px;">
                    <div class="role-grid" id="roleGrid"></div>
                </div>
            </div>

        </div>
    </div>

    <div class="loading" id="loading"><div class="spinner"></div><p id="loadingMsg">加载中...</p></div>
    <div class="error" id="errorBox" style="display:none"></div>

</main>

<div id="toast"></div>

<script src="js/api.js"></script>
<script>
window.allChars = [];
window.accountInfo = null;
window.calabashData = null;
window.roleAccounts = []; // list of {roleId, roleName, ...} from role-list

// ─── Auth ───
function goLogin() { window.location.href = '/login'; }
function doLogout() {
    clearAuth(); cacheClear(); updateAuthUI();
    document.getElementById('roleGrid').innerHTML = '';
    document.getElementById('userCard').style.display = 'none';
    document.getElementById('overviewSection').style.display = 'none';
    document.getElementById('accountArea').style.display = 'none';
    document.getElementById('accountSelect').innerHTML = '';
    window.accountInfo = null; window.calabashData = null; window.allChars = []; window.roleAccounts = [];
}
function updateAuthUI() {
    const li = isLoggedIn();
    document.getElementById('loginStatus').textContent = li ? '已登录' : '未登录';
    document.getElementById('loginBtn').style.display = li ? 'none' : '';
    document.getElementById('logoutBtn').style.display = li ? '' : 'none';
    document.getElementById('accountArea').style.display = li ? '' : 'none';
}

function populateAccountSelect() {
    const sel = document.getElementById('accountSelect');
    const curUid = getStoredAuth().uid;
    sel.innerHTML = window.roleAccounts.map(a =>
        `<option value="${a.roleId}" ${String(a.roleId) === String(curUid) ? 'selected' : ''}>${a.roleName || '漂泊者'} — UID ${a.roleId}</option>`
    ).join('');
    if (!curUid && window.roleAccounts.length > 0) {
        const first = window.roleAccounts[0];
        storeAuth(null, null, first.roleId, null);
    }
}

function onAccountChange() {
    const newUid = document.getElementById('accountSelect').value;
    if (newUid && newUid !== String(getStoredAuth().uid || '')) {
        storeAuth(null, null, newUid, null);
        cacheClear(); window.accountInfo = null; window.calabashData = null; window.allChars = [];
        document.getElementById('userCard').style.display = 'none';
        document.getElementById('overviewSection').style.display = 'none';
        document.getElementById('roleGrid').innerHTML = '';
        loadAll(true);
    }
}

// ─── Refresh ───
async function refreshAll() {
    if (!getStoredAuth().uid) { toast('请先选择账号', 'error'); return; }
    document.getElementById('loading').style.display = '';
    try {
        await apiRefreshData();
        cacheClear(); window.accountInfo = null; window.calabashData = null; window.allChars = []; window.roleAccounts = [];
        await loadAll(true);
        toast('已刷新', 'success');
    }
    catch (e) { toast('刷新失败: ' + e.message, 'error'); }
    document.getElementById('loading').style.display = 'none';
}

// ─── Load All Data ───
async function loadAll(force) {
    const loading = document.getElementById('loading'), err = document.getElementById('errorBox');
    loading.style.display = ''; err.style.display = 'none';
    try {
        // Ensure UID exists and account list is populated
        if (!force) {
            const cachedAccounts = cacheGet('roleAccounts');
            if (cachedAccounts && cachedAccounts.length > 0) { window.roleAccounts = cachedAccounts; populateAccountSelect(); }
            const c = cacheGet('roleList');
            if (c && c.length > 0) window.allChars = c;
            const acct = cacheGet('accountInfo');
            if (acct) window.accountInfo = acct;
            const cala = cacheGet('calabashData');
            if (cala) window.calabashData = cala;
        }

        if (window.roleAccounts.length === 0) {
            try {
                const r = await apiGetRoleList();
                if (r.success && r.data) {
                    const rl = Array.isArray(r.data) ? r.data : (r.data.roleList || r.data.list || []);
                    if (rl.length > 0) {
                        window.roleAccounts = rl; cacheSet('roleAccounts', rl);
                        populateAccountSelect();
                        if (!getStoredAuth().uid) {
                            const gu = String(rl[0].roleId || '');
                            if (gu) storeAuth(null, null, gu, null);
                        }
                    }
                }
            } catch (e) { }
            if (!getStoredAuth().uid) { err.style.display = 'block'; err.textContent = '未能获取游戏角色，请重新登录'; loading.style.display = 'none'; return; }
        }

        // Fetch account info + calabash only if not cached or force refresh
        if (!window.accountInfo || !window.calabashData || force) {
            const [br, cr] = await Promise.allSettled([apiGetBaseData(), apiGetCalabash()]);
            if (br.status === 'fulfilled' && br.value.success && br.value.data) { window.accountInfo = br.value.data; cacheSet('accountInfo', br.value.data); }
            if (cr.status === 'fulfilled' && cr.value.success && cr.value.data) { window.calabashData = cr.value.data; cacheSet('calabashData', cr.value.data); }
        }

        // Hydrate cached scores/details into existing role list (e.g. after panel visits)
        if (window.allChars.length > 0) {
            let anyHydrated = false;
            for (const r of window.allChars) {
                if (hydrateCharFromCache(r)) anyHydrated = true;
            }
            if (anyHydrated) cacheSet('roleList', window.allChars);
            renderPage(); loading.style.display = 'none'; return;
        }

        // Full load: only refresh BAT on explicit refresh
        if (force) await apiRefreshBat();

        // Role data — basic info only, NO batch score/detail API calls
        const rr = await apiGetRoleData();
        if (!rr.success) throw new Error(rr.msg || '获取角色数据失败');
        let rl = (rr.data && rr.data.roleList) ? rr.data.roleList : (Array.isArray(rr.data) ? rr.data : []);
        if (!rl.length) { loading.style.display = 'none'; return; }

        // Initialize all characters WITHOUT scores/details — will be loaded on-demand
        for (const r of rl) {
            r._score = null;   // null = not loaded yet (distinct from 0)
            r._grade = null;
            r._detail = null;
        }

        // Sort by level descending as default (no scores available yet)
        rl.sort((a, b) => (b.level || b.role?.level || 0) - (a.level || a.role?.level || 0));
        window.allChars = rl;
        cacheSet('roleList', rl);

        // Hydrate any per-character caches that already exist (e.g. from previous sessions)
        let anyHydrated = false;
        for (const r of window.allChars) {
            if (hydrateCharFromCache(r)) anyHydrated = true;
        }
        if (anyHydrated) cacheSet('roleList', window.allChars);

        renderPage();
    } catch (e) { err.style.display = 'block'; err.textContent = '加载失败: ' + e.message; }
    loading.style.display = 'none';
}

function renderPage() { renderUserCard(); renderOverview(); renderRoleGrid(); }

// ─── User Card ───
function renderUserCard() {
    const card = document.getElementById('userCard'), acct = window.accountInfo;
    if (!acct) { card.style.display = 'none'; return; }
    card.style.display = '';
    let av = '';
    const fs = window.allChars.find(r => (r.starLevel || r.role?.starLevel || 0) >= 5);
    if (fs) { const cid = String(fs.roleId || fs.role?.roleId || ''); av = getResourceUrl('waves_avatar', 'role_head_' + cid + '.png'); }
    const img = document.getElementById('userAvatar'); img.src = av;
    img.onerror = function () { this.style.display = 'none'; };
    img.onload = function () { this.style.display = 'block'; };
    document.getElementById('userName').textContent = (acct.name || '漂泊者').substring(0, 10);
    document.getElementById('userUid').textContent = 'UID ' + (acct.id || '--');
    const isFull = typeof acct.creatTime === 'number';
    document.getElementById('userStats').innerHTML =
        `<div class="stat-item"><div class="stat-value">${isFull ? (acct.level ?? '--') : '--'}</div><div class="stat-label">联觉等级</div></div>` +
        `<div class="stat-item"><div class="stat-value">${isFull ? (acct.worldLevel ?? '--') : '--'}</div><div class="stat-label">索拉等级</div></div>`;
}

// ─── Overview ───
function renderOverview() {
    const section = document.getElementById('overviewSection'), acct = window.accountInfo;
    if (!acct || typeof acct.creatTime !== 'number') { section.style.display = 'none'; return; }
    section.style.display = '';
    const upNum = computeUpCount(window.allChars);
    const calabashLevel = (window.calabashData && window.calabashData.isUnlock) ? window.calabashData.level : 0;
    const items = [
        { key: '活跃天数', value: acct.activeDays ?? '--', highlight: true },
        { key: '解锁角色', value: acct.roleNum ?? '--', highlight: false },
        { key: 'UP角色', value: upNum, highlight: true },
        { key: '数据坞等级', value: calabashLevel, highlight: false },
        { key: '已达成成就', value: acct.achievementCount ?? '--', highlight: true },
        { key: '成就星数', value: acct.achievementStar ?? '--', highlight: false },
        { key: '小型信标', value: acct.smallCount ?? '--', highlight: false },
        { key: '中型信标', value: acct.bigCount ?? '--', highlight: true },
    ];
    if (acct.treasureBoxList && acct.treasureBoxList.length) {
        acct.treasureBoxList.forEach((b, i) => { if (b && b.name) items.push({ key: b.name, value: b.num ?? '--', highlight: i % 2 === 0 }); });
    }
    document.getElementById('overviewGrid').innerHTML = items.map(it =>
        `<div class="info-item${it.highlight ? ' highlight' : ''}"><div class="info-key">${it.key}</div><div class="info-value">${it.value}</div></div>`).join('');
}

// ─── Role Grid ───
function renderRoleGrid() {
    const q = (document.getElementById('searchInput').value || '').toLowerCase();
    const sort = document.getElementById('sortSelect').value;
    let list = [...window.allChars];
    if (q) list = list.filter(r => (r.roleName || r.role?.roleName || '').toLowerCase().includes(q));
    if (sort === 'score') list.sort((a, b) => (b._score ?? -1) - (a._score ?? -1));
    else if (sort === 'level') list.sort((a, b) => (b.level || b.role?.level || 0) - (a.level || a.role?.level || 0));
    else list.sort((a, b) => (a.attributeId || a.role?.attributeId || 0) - (b.attributeId || b.role?.attributeId || 0));
    const grid = document.getElementById('roleGrid');
    if (!list.length) { grid.innerHTML = '<div class="no-results">无匹配角色</div>'; return; }
    grid.innerHTML = list.map(r => buildRoleCard(r)).join('');
}

function buildRoleCard(r) {
    const ri = r.role || r;
    const cid = String(r.roleId || ri.roleId || '');
    const cn = ri.roleName || '?';
    const lv = r.level || ri.level || '?';
    const sl = ri.starLevel || 5;
    const attr = ATTRIBUTES[ri.attributeId] || { name: '?', color: '#666' };
    const d = r._detail;
    const hasDetail = d != null;
    const hasScore = r._score != null;
    const chain = (d && d.chainList) ? d.chainList.filter(c => c.unlocked).length : (r.chainUnlockNum ?? 0);
    const sc = r._score || 0;
    const g = r._grade || { label: '-', color: '#666' };

    const av = getResourceUrl('waves_avatar', 'role_head_' + cid + '.png');
    const attrIcon = getAttrIcon(attr.name);
    const starClass = sl >= 5 ? 'star-gold' : 'star-purple';
    const chainName = CHAIN_NAMES[Math.min(chain, 6)] || '零链';

    // Weapon line — show detailed weapon only if detail is loaded
    let weaponHtml = '';
    if (hasDetail && d.weaponData) {
        const wd = d.weaponData, w = wd.weapon;
        weaponHtml = `<div class="weapon-line" title="${w.weaponName} Lv.${wd.level} 精${wd.resonLevel}">
            <img src="${getResourceUrl('waves_weapon','weapon_'+w.weaponId+'.png')}" alt="" onerror="this.style.display='none'">
            <span>${w.weaponName}</span><span>Lv.${wd.level}</span>
            <span class="reson-badge">精${wd.resonLevel}</span></div>`;
    } else {
        const wtName = WEAPON_TYPES[ri.weaponTypeId] || '';
        const wtIcon = wtName ? getWeaponTypeIcon(wtName) : '';
        weaponHtml = `<div class="weapon-line">${wtIcon?`<img src="${wtIcon}" alt="" onerror="this.style.display='none'">`:''}<span>${wtName}</span></div>`;
    }

    // Skills — only show if detail is loaded
    let skillsHtml = '';
    if (hasDetail && d.skillList) {
        const sorted = [...d.skillList].sort((a,b) => SKILL_ORDER.indexOf(a.skill?.type) - SKILL_ORDER.indexOf(b.skill?.type));
        skillsHtml = `<div class="skills-row">${sorted.slice(0,5).map(s => `
            <div class="skill-item">
                <img src="${s.skill?.iconUrl||''}" alt="" onerror="this.style.display='none'">
                <span class="sk-lv">${s.level||1}</span>
            </div>`).join('')}</div>`;
    }

    // Score display
    const scoreDisplay = hasScore
        ? `<div class="score-grade" style="color:${g.color}">${g.label}</div>
           <div class="score-num" style="color:${g.color}">${sc>0?sc.toFixed(0):'--'}</div>`
        : `<div class="score-grade" style="color:#555;font-size:1.1rem">--</div>
           <div class="score-num" style="color:#555;font-size:0.6rem;font-style:normal;font-family:inherit">点击加载</div>`;

    return `
    <div class="role-card" data-rarity="${sl}" onclick="openPanel('${cid}')" title="${cn}${hasScore ? ' — ' + g.label : ' — 点击查看详情'}">
        <div class="role-card-top">
            <div class="role-avatar-box">
                <img src="${av}" alt="${cn}" class="avatar-img" onerror="this.style.background='#222'">
                <div class="attr-icon-sm"><img src="${attrIcon}" alt="${attr.name}" onerror="this.parentElement.style.display='none'"></div>
                <div class="level-badge">Lv.${lv}</div>
            </div>
            <div class="role-card-info">
                <div class="star-line ${starClass}">${'★'.repeat(Math.min(sl,6))}</div>
                <div class="name-line">${cn}</div>
                <div class="chain-line chain-c-${Math.min(chain,6)}">${chainName}</div>
                ${weaponHtml}
                <div class="score-corner">
                    ${scoreDisplay}
                </div>
            </div>
        </div>
        <div class="card-bottom">
            ${skillsHtml}
        </div>
    </div>`;
}

function computeUpCount(roleList) {
    let c = 0;
    for (const r of roleList) { const ri = r.role || r; if (ri.starLevel === 5 && !STANDARD_BANNER_NAMES.includes(ri.roleName || '')) c++; }
    return c;
}

async function openPanel(cid) {
    // Pre-load detail + score before navigating so panel loads instantly from cache
    try {
        await loadCharDetailAndScore(cid, false);
        // Update the entry in allChars so the grid reflects cached data
        for (const r of window.allChars) {
            if (String(r.roleId || r.role?.roleId || '') === cid) {
                hydrateCharFromCache(r);
                break;
            }
        }
        cacheSet('roleList', window.allChars);
        renderRoleGrid();
    } catch (e) {
        // If pre-load fails, still navigate — panel will retry
        console.warn('Pre-load failed, will retry in panel:', e.message);
    }
    window.location.href = 'panel.html?charId=' + cid;
}

async function initAfterLogin() {
    const { token, did, uid } = getStoredAuth();
    if (!token || !did) return;
    updateAuthUI();
    // Restore cached accounts first
    if (window.roleAccounts.length === 0) {
        const cached = cacheGet('roleAccounts');
        if (cached && cached.length > 0) { window.roleAccounts = cached; populateAccountSelect(); }
    }
    if (!uid || window.roleAccounts.length === 0) {
        try { const r = await apiGetRoleList(); if (r.success && r.data) { const rl = Array.isArray(r.data) ? r.data : (r.data.roleList || r.data.list || []); if (rl.length > 0) { window.roleAccounts = rl; cacheSet('roleAccounts', rl); populateAccountSelect(); if (!uid) { const gu = String(rl[0].roleId || ''); if (gu) storeAuth(null, null, gu, null); } } } } catch (e) { }
        if (!getStoredAuth().bat) { try { await apiRefreshBat(); } catch (e) { } }
    }
    if (getStoredAuth().uid) await loadAll(false);
}

function toast(msg, type) { const el = document.getElementById('toast'); el.className = 'toast toast-' + type; el.textContent = msg; setTimeout(() => { el.textContent = ''; el.className = ''; }, 3000); }

(function () {
    if (initFromUrlParams()) { toast('登录成功！', 'success'); initAfterLogin(); return; }
    if (!isLoggedIn()) {
        document.getElementById('loading').innerHTML = '<p style="color:var(--text-dim);font-size:1rem;">请先登录查看角色面板</p>';
        return;
    }
    initAfterLogin();
})();
</script>
</body>
</html>
